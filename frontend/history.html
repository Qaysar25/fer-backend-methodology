<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>History | FER Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body class="app-page">
    <nav class="navbar navbar-expand-lg app-navbar sticky-top">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
          <span class="nav-logo"><i class="fa-solid fa-face-smile-wink"></i></span>
          <span>FER Systems</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
            <li class="nav-item"><a class="nav-link" href="index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="history.html"><i class="fa-solid fa-clock-rotate-left"></i> History</a></li>
            <li class="nav-item"><button class="btn btn-outline-light btn-sm logout-btn" type="button" data-logout><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="history-main">
      <div class="container">
        <div class="history-header">
          <div>
            <p class="secure-kicker"><i class="fa-solid fa-database"></i> Protected scan archive</p>
            <h1>Recognition History</h1>
            <p class="text-white-50 mb-0">Search, review, and remove mock FER scan records.</p>
          </div>
          <a class="btn btn-primary" href="index.html"><i class="fa-solid fa-plus me-2"></i>New Scan</a>
        </div>

        <section class="panel history-panel">
          <div class="toolbar">
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input id="historySearch" type="search" class="form-control" placeholder="Search by image, emotion, or date">
            </div>
            <span class="status-pill" id="recordCount">0 records</span>
          </div>
          <div class="table-responsive">
            <table class="table align-middle history-table">
              <thead>
                <tr>
                  <th>Image Name</th>
                  <th>Emotion</th>
                  <th>Confidence</th>
                  <th>Date</th>
                  <th class="text-end">Action</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/history.js"></script>
  </body>
</html>
