<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | FER Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="loginTitle">
        <div class="brand-mark mx-auto mb-4">
          <i class="fa-solid fa-face-smile-wink"></i>
        </div>
        <div class="text-center mb-4">
          <p class="secure-kicker"><i class="fa-solid fa-lock"></i> Secure FER access</p>
          <h1 id="loginTitle">Welcome back</h1>
          <p class="text-white-50 mb-0">Sign in to monitor customer emotion insights.</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email or username</label>
            <div class="input-icon">
              <i class="fa-solid fa-user-shield"></i>
              <input class="form-control" id="email" name="email" type="text" placeholder="user@example.com" autocomplete="username" required>
            </div>
            <div class="invalid-feedback d-block" id="emailError"></div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-icon">
              <i class="fa-solid fa-key"></i>
              <input class="form-control" id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <div class="invalid-feedback d-block" id="passwordError"></div>
          </div>

          <div class="d-flex align-items-center justify-content-between gap-3 mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember">
              <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a class="auth-link" href="#">Forgot Password?</a>
          </div>

          <button class="btn btn-primary w-100 auth-submit" type="submit" id="loginButton">
            <span class="btn-text"><i class="fa-solid fa-right-to-bracket me-2"></i>Login</span>
            <span class="spinner-border spinner-border-sm d-none" aria-hidden="true"></span>
          </button>
          <p class="small text-center text-white-50 mt-4 mb-0">
            New to FER Systems? <a class="auth-link" href="#">Register</a>
          </p>
        </form>
      </section>
    </main>

    <script src="js/auth.js"></script>
  </body>
</html>
